<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Upasthiti</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #1f2937; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #374151; padding: 40px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; background: #4b5563; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Super Admin</h2>
        <input type="password" id="master-key" placeholder="Master Secret Key" />
        <hr style="border-color: #4b5563; margin: 20px 0;">
        <input type="text" id="inst-name" placeholder="Institute Name (e.g. RGIPT)" />
        <input type="text" id="username" placeholder="New Username" />
        <input type="password" id="password" placeholder="New Password" />
        <button onclick="createAccount()">Create Instructor</button>
    </div>
    <script>
        async function createAccount() {
            const master = document.getElementById('master-key').value;
            const inst = document.getElementById('inst-name').value;
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(!master || !inst || !user || !pass) return alert("Fill all fields");

            const res = await fetch('/api/instructor/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: user, password: pass, institute_name: inst, master_key: master
                })
            });
            const data = await res.json();
            if(res.ok) alert("Success: " + data.message);
            else alert("Error: " + data.detail);
        }
    </script>
</body>
</html>
