<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Upasthiti</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-hover: rgba(51, 65, 85, 0.8);
            --primary: #10b981; /* Emerald 500 */
            --primary-glow: rgba(16, 185, 129, 0.4);
            --text-main: #f8fafc;
            --text-sec: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark);
            /* Richer, darker gradient background */
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(225,39%,15%,1) 0, transparent 50%),
                radial-gradient(at 50% 100%, hsla(225,39%,10%,1) 0, transparent 50%);
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Decorative background blobs */
        .blob {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--primary);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }
        .blob-1 { top: -50px; left: -50px; }
        .blob-2 { bottom: -50px; right: -50px; background: #6366f1; }

        .card { 
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 48px 40px; 
            border-radius: 24px; 
            width: 100%;
            box-sizing: border-box;
            text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            border: 1px solid var(--border);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        h2 { 
            margin: 0 0 8px 0; 
            font-weight: 700; 
            font-size: 1.5rem;
            letter-spacing: -0.025em; 
            color: white;
        }
        
        p { 
            margin: 0 0 32px 0; 
            color: var(--text-sec); 
            font-size: 0.95rem; 
            line-height: 1.5;
        }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        
        .input-group i { 
            position: absolute; 
            left: 16px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--text-sec); 
            font-size: 1.2rem;
            transition: color 0.3s;
            pointer-events: none;
        }

        input { 
            width: 100%; 
            padding: 14px 16px 14px 48px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            background: rgba(15, 23, 42, 0.6); 
            color: white; 
            box-sizing: border-box; 
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        
        input::placeholder { color: rgba(148, 163, 184, 0.5); }
        input:focus + i { color: var(--primary); }

        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, var(--primary) 0%, #059669 100%);
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 1rem;
            cursor: pointer; 
            margin-top: 12px; 
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
            filter: brightness(1.1);
        }
        
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; filter: grayscale(0.5); }

        .divider { 
            display: flex; 
            align-items: center; 
            color: var(--text-sec); 
            font-size: 0.8rem; 
            margin: 28px 0; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider span { padding: 0 12px; }

        /* Toast Notification */
        .toast { 
            position: fixed; top: 24px; right: 24px; 
            background: rgba(31, 41, 55, 0.95); 
            color: white; 
            padding: 16px 24px; border-radius: 12px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transform: translateY(-20px) scale(0.95); 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            pointer-events: none; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .toast.show { opacity: 1; transform: translateY(0) scale(1); }

        /* Spinner */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Focus ring animation for invalid input */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border-color: var(--danger) !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

    </style>
</head>
<body>

    <div id="toast" class="toast">Notification</div>

    <div class="container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <div class="card">
            <div class="icon-wrapper">
                <i class="ph-fill ph-shield-check" style="font-size: 42px; color: var(--primary);"></i>
            </div>
            <h2>Super Admin</h2>
            <p>Secure access for creating and managing instructor accounts.</p>
            
            <div class="input-group">
                <input type="password" id="master-key" placeholder="Master Secret Key" />
                <i class="ph ph-key"></i>
            </div>
            
            <div class="divider"><span>New Account Details</span></div>
            
            <div class="input-group">
                <input type="text" id="inst-name" placeholder="Institute Name (e.g. RGIPT)" />
                <i class="ph ph-buildings"></i>
            </div>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" autocomplete="off" />
                <i class="ph ph-user"></i>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" />
                <i class="ph ph-lock-key"></i>
            </div>
            
            <button id="btn-create" onclick="createAccount()">
                Create Instructor <i class="ph-bold ph-arrow-right"></i>
            </button>
        </div>
    </div>

    <script>
        function showToast(msg, type='normal') {
            const t = document.getElementById('toast');
            t.innerHTML = type === 'error' 
                ? `<i class="ph-fill ph-warning-circle" style="color:#f87171; font-size:1.4rem;"></i> <span>${msg}</span>`
                : `<i class="ph-fill ph-check-circle" style="color:#34d399; font-size:1.4rem;"></i> <span>${msg}</span>`;
            
            t.className = 'toast show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function createAccount() {
            const master = document.getElementById('master-key');
            const inst = document.getElementById('inst-name');
            const user = document.getElementById('username');
            const pass = document.getElementById('password');
            const btn = document.getElementById('btn-create');

            // Simple validation visual feedback
            let isValid = true;
            [master, inst, user, pass].forEach(el => {
                if(!el.value.trim()) {
                    el.classList.add('shake');
                    setTimeout(() => el.classList.remove('shake'), 400);
                    isValid = false;
                }
            });

            if(!isValid) return showToast("All fields are required", "error");

            // UI Loading State
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<div class="spinner"></div> Processing...`;
            btn.disabled = true;

            try {
                const res = await fetch('/api/instructor/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: user.value, 
                        password: pass.value, 
                        institute_name: inst.value, 
                        master_key: master.value
                    })
                });
                const data = await res.json();
                
                if(res.ok) {
                    showToast(data.message || "Account created successfully!");
                    // Clear non-master fields for convenience
                    inst.value = "";
                    user.value = "";
                    pass.value = "";
                } else {
                    showToast(data.detail || "Registration failed", "error");
                    // If forbidden, maybe shake the master key
                    if(res.status === 403 || res.status === 401) {
                         master.classList.add('shake');
                         setTimeout(() => master.classList.remove('shake'), 400);
                    }
                }
            } catch(e) {
                showToast("Connection error. Check server.", "error");
            } finally {
                // Restore Button
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
